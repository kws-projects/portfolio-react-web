name: Release

# When a PR is merged into main, bump the version and open a PR to sync the
# bump back into develop. The bump commit is the one exception to the
# "never commit directly to main" rule.
on:
  push:
    branches: [main]

jobs:
  bump-version:
    # Skip the run triggered by our own bump commit to avoid an infinite loop.
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump level
        id: level
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s %b")
          if echo "$COMMITS" | grep -qE "BREAKING CHANGE|!\(.+\):|!:"; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: bump
        run: |
          npm version ${{ steps.level.outputs.bump }} --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit and push bump to main
        run: |
          git add package.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Open PR to merge main back into develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base develop \
            --head main \
            --title "chore: sync release v${{ steps.bump.outputs.version }} to develop" \
            --body "Automated PR to merge the version bump (v${{ steps.bump.outputs.version }}) from \`main\` back into \`develop\`." \
            || echo "A PR from main to develop already exists; skipping."
